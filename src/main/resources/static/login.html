<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Learnix</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="card glass">
            <div class="text-center" style="margin-bottom: 2rem;">
                <i class="fa-solid fa-graduation-cap" style="font-size: 3rem; color: var(--primary-color);"></i>
                <h2 style="margin-top: 1rem;">Login to Learnix</h2>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-block"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
            </form>
            <p class="text-center" style="margin-top: 1.5rem; font-size: 0.95rem;">
                Don't have an account? <a href="signup.html" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">Sign up</a>
            </p>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
