<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task - Learnix</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <aside class="sidebar glass">
        <h1><i class="fa-solid fa-graduation-cap"></i> Learnix</h1>
        <div class="nav-links">
            <span id="userNameDisplay">Welcome!</span>
            <a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            <a href="subjects.html"><i class="fa-solid fa-book"></i> Subjects</a>
            <a href="calendar.html"><i class="fa-solid fa-calendar-days"></i> Calendar</a>
            <a href="solo-study.html"><i class="fa-solid fa-headphones"></i> Solo Study Mode</a>
            <a href="#" id="profileBtn"><i class="fa-solid fa-user-circle"></i> Profile</a>
            
            <div class="theme-toggle-container">
                <span id="themeLabel" class="theme-toggle-label"><i class="fa-solid fa-sun"></i> Light Mode</span>
                <label class="ios-switch">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
            <div class="card glass" style="width: 100%; max-width: 500px;">
                <div class="text-center" style="margin-bottom: 2rem;">
                    <i class="fa-solid fa-list-check" style="font-size: 3rem; color: var(--primary-color);"></i>
                    <h2 style="margin-top: 1rem;">Add New Task</h2>
                </div>
                <form id="addTaskForm">
                    <input type="hidden" id="subjectId">
                    <div class="form-group" id="subjectSelectGroup">
                        <label>Subject</label>
                        <i class="fa-solid fa-book input-icon"></i>
                        <select id="subjectSelect">
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Task Title</label>
                        <i class="fa-solid fa-heading input-icon"></i>
                        <input type="text" id="title" required placeholder="e.g. Read chapter 5">
                    </div>
                    <div class="form-group">
                        <label>Deadline</label>
                        <i class="fa-solid fa-calendar-days input-icon"></i>
                        <input type="date" id="deadline" required>
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <i class="fa-solid fa-flag input-icon"></i>
                        <select id="priority" required>
                            <option value="HIGH">High Priority</option>
                            <option value="MEDIUM">Medium Priority</option>
                            <option value="LOW">Low Priority</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-block"><i class="fa-solid fa-plus"></i> Add Task</button>
                </form>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const subjectId = urlParams.get('subjectId');
            const date = urlParams.get('date');
            
            if (date) {
                document.getElementById('deadline').value = date;
            }

            if (subjectId) {
                document.getElementById('subjectId').value = subjectId;
                document.getElementById('subjectSelectGroup').style.display = 'none';
            } else {
                const user = JSON.parse(localStorage.getItem('user'));
                if (!user) return window.location.href = 'login.html';
                
                try {
                    const res = await fetch(`/api/subjects/user/${user.id}`);
                    const subjects = await res.json();
                    
                    if(subjects.length === 0) {
                        alert('Please create a subject first!');
                        window.location.href = 'subjects.html';
                        return;
                    }
                    
                    const select = document.getElementById('subjectSelect');
                    subjects.forEach(s => {
                        const option = document.createElement('option');
                        option.value = s.id;
                        option.textContent = s.name;
                        select.appendChild(option);
                    });
                } catch(e) {
                    console.error('Error fetching subjects', e);
                }
            }
        });

        document.getElementById('addTaskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const subjectId = document.getElementById('subjectId').value || document.getElementById('subjectSelect').value;
            const title = document.getElementById('title').value;
            const deadline = document.getElementById('deadline').value;
            const priority = document.getElementById('priority').value;

            const response = await fetch(`/api/tasks/subject/${subjectId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, deadline, priority })
            });

            if (response.ok) {
                window.location.href = 'dashboard.html';
            } else {
                alert('Error adding task');
            }
        });
    </script>
    <!-- Profile Modal -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal-content card glass">
            <div class="calendar-header" style="margin-bottom: 1rem;">
                <h3 style="margin: 0;">Profile</h3>
                <button class="btn" id="closeProfileBtn" style="padding: 0.2rem 0.5rem;"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="profile-header" style="text-align: center; margin-bottom: 1.5rem;">
                <div class="avatar-container" style="position: relative; display: inline-block;">
                    <img id="profileAvatarImg" src="" alt="Avatar" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; display: none; border: 2px solid var(--primary-color);">
                    <i id="profileAvatarIcon" class="fa-solid fa-user-circle fa-4x" style="color: var(--primary-color);"></i>
                    <label for="profilePicUpload" class="avatar-edit-btn" style="position: absolute; bottom: 0; right: -5px; background: var(--primary-color); color: white; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--card-bg); box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                        <i class="fa-solid fa-camera" style="font-size: 0.8rem;"></i>
                    </label>
                    <input type="file" id="profilePicUpload" accept="image/*" style="display: none;">
                </div>
                <h2 style="margin-top: 1rem; margin-bottom: 0.2rem;" id="profileNameDisplay">Student</h2>
                <p style="margin: 0; color: var(--text-secondary); font-size: 0.85rem;">Official: <span id="profileOfficialNameDisplay">Student</span></p>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-user"></i> Display Name</label>
                <input type="text" id="profileDisplayName" class="ios-input" placeholder="How you want to be called">
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-graduation-cap"></i> Grade / Year</label>
                <input type="text" id="profileGrade" class="ios-input" placeholder="e.g., 10th Grade, Sophomore">
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-id-badge"></i> Student Status</label>
                <input type="text" id="profileStatus" class="ios-input" placeholder="e.g., Full-time, Part-time">
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-clock"></i> Total Study Time</label>
                <div class="stat-card glass" style="text-align: center; padding: 1rem; margin-top: 0.5rem; min-height: 80px;">
                    <p id="profileTotalTime" style="font-size: 1.5rem; font-weight: bold; color: var(--primary-color);">0h 0m</p>
                </div>
            </div>
            <button id="saveProfileBtn" class="btn btn-block" style="margin-top: 1rem;"><i class="fa-solid fa-save"></i> Save Profile</button>
            <button id="modalLogoutBtn" class="btn btn-danger btn-block" style="margin-top: 0.5rem;"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
            <button id="modalDeleteAccountBtn" class="btn btn-block" style="margin-top: 0.5rem; background: transparent; border: 1px solid var(--danger-color); color: var(--danger-color);"><i class="fa-solid fa-user-xmark"></i> Delete Account</button>
        </div>
    </div>
</body>
</html>
